<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DevOps CI Demo ESE</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>DevOps CI Demo App</h1>
      <p>Interact with the features below.</p>
    </header>

    <main>
      <section>
        <h2>Message Display</h2>
        <button id="show-message-btn">Show Message</button>
        <div id="message" class="message" aria-live="polite"></div>
      </section>

      <section>
        <h2>Counter</h2>
        <button id="increment-btn">Increment Counter</button>
        <p id="counter">Counter: 0</p>
      </section>

      <section>
        <h2>Text Input</h2>
        <input type="text" id="text-input" placeholder="Enter some text" />
        <button id="display-text-btn">Display Text</button>
        <div id="displayed-text" class="message"></div>
      </section>

      <section>
        <h2>Dark Mode Toggle</h2>
        <button id="toggle-theme-btn">Toggle Dark Mode</button>
      </section>

      <section>
        <h2>Simple Calculator</h2>
        <input type="number" id="num1" placeholder="Number 1" />
        <input type="number" id="num2" placeholder="Number 2" />
        <button id="add-btn">Add</button>
        <div id="result" class="message"></div>
      </section>

      <section>
        <h2>Todo List</h2>
        <input type="text" id="todo-input" placeholder="Add a todo" />
        <button id="add-todo-btn">Add Todo</button>
        <ul id="todo-list"></ul>
      </section>

      <section>
        <h2>Random Color Generator</h2>
        <button id="random-color-btn">Generate Random Color</button>
        <div id="color-display" class="message"></div>
      </section>

    <footer>
      <p>Built for CI/CD pipeline demonstration.</p>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
