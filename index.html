<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DevOps CI Demo</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>DevOps CI Demo App</h1>
      <p>Interact with the features below.</p>
    </header>

    <main>
      <section>
        <h2>Message Display</h2>
        <button id="show-message-btn">Show Message</button>
        <div id="message" class="message" aria-live="polite"></div>
      </section>

      <section>
        <h2>Counter</h2>
        <button id="increment-btn">Increment Counter</button>
        <p id="counter">Counter: 0</p>
      </section>

      <section>
        <h2>Text Input</h2>
        <input type="text" id="text-input" placeholder="Enter some text" />
        <button id="display-text-btn">Display Text</button>
        <div id="displayed-text" class="message"></div>
      </section>

      <section>
        <h2>Dark Mode Toggle</h2>
        <button id="toggle-theme-btn">Toggle Dark Mode</button>
      </section>
    </main>

    <footer>
      <p>Built for CI/CD pipeline demonstration.</p>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
